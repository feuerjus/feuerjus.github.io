<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>feuerjus</title>
  <meta name="theme-color" content="#0d0d0a">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/pictures/logo_pwa.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-left">
      <h1 class="site-title">feuerjus<span class="cursor">_</span></h1>
      <p class="site-sub">personal site</p>
    </div>
    <button id="install-btn" class="install-btn" aria-label="Install app">+install</button>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">
      <svg class="icon-sun" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="tools">tools</button>
    <button class="tab-btn" data-tab="knowledge">knowledge</button>
    <button class="tab-btn" data-tab="projects">projects</button>
  </nav>

  <main class="content-area" id="tab-content">
    <p class="loading">loading...</p>
  </main>

  <footer class="site-footer">
    feuerjus 2026
  </footer>

  <div id="pwa-modal" class="pwa-modal-overlay" hidden>
    <div class="pwa-modal">
      <button id="pwa-modal-close" class="pwa-modal-close" aria-label="Close">&times;</button>
      <div class="pwa-modal-icon">+install</div>
      <h2 class="pwa-modal-title">Install App</h2>
      <div id="pwa-modal-body">
        <p>Add feuerjus to your home screen for the best experience.</p>
      </div>
      <div id="pwa-modal-ios" hidden>
        <ol class="pwa-steps">
          <li>Tap the <strong>Share</strong> button <span class="ios-icon-share"></span> in Safari</li>
          <li>Scroll down and tap <strong>Add to Home Screen</strong></li>
          <li>Tap <strong>Add</strong> in the top-right corner</li>
        </ol>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
